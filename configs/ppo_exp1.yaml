# =============================================================================
# configs/ppo_exp1.yaml
# Phase 1 — PPO Exp 1 (SYMMETRIC: pi=[256,256] == vf=[256,256]). The 1:1 control
# that inverted asymmetry (Exp 4) must beat at fixed budget.
#
# Verbatim from the paper's Table 2 AND the original PPO notebook (cell 3) — the
# two agree exactly. Each PPO experiment has its OWN hyperparameters; do NOT tune.
# (Correction: an earlier draft of this file mistakenly copied Exp 4's values.)
# =============================================================================

config_id: ppo_exp1
algo: ppo
policy: MlpPolicy

net_arch:
  pi: [256, 256]
  vf: [256, 256]
activation_fn: ReLU        # Table 2 / notebook
ortho_init: true           # notebook cell 3 (not in Table 2)

lr: 0.0002                 # 2e-4
gamma: 0.990
batch_size: 256

n_seeds: 10
env_steps: 200000          # working budget (smoke tests converged by ~200k)

n_steps: 2048
n_epochs: 10
gae_lambda: 0.95
clip_range: 0.2
ent_coef: 0.020

eval_freq: 20000
eval_episodes: 15          # config-driven; 15 = 5/room. Eval is deterministic (fixed spawn, only target varies),
  # so per-room outcome has zero within-run variance -> 15 carries the same info as 30.
