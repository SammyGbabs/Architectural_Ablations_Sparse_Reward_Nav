# =============================================================================
# configs/dqn_exp2.yaml
# Phase 1 — DQN Exp 2 ([512,256], gamma 0.995). Identical to Exp 5 EXCEPT
# gamma (0.995 here vs 0.990 in Exp 5) — the two differ only in discount.
#
# Source: paper Table 1, and this matches the original DQN notebook / legacy
# train_metrics.py (both gamma 0.995 with [512,256]). The shared rig values
# (target_update_interval, train_freq, gradient_steps, eval_freq) come from the
# legacy dqn_training.py. activation_fn unset -> SB3 default (ReLU). Do NOT tune.
# =============================================================================

config_id: dqn_exp2
algo: dqn
policy: MlpPolicy

net_arch: [512, 256]

lr: 0.0003
gamma: 0.995
batch_size: 256

n_seeds: 10
env_steps: 200000

buffer_size: 100000
exploration_fraction: 0.15
exploration_initial_eps: 1.0
exploration_final_eps: 0.02

target_update_interval: 1000
train_freq: 4
gradient_steps: 1

eval_freq: 10000
eval_episodes: 15          # config-driven; 15 = 5/room. Eval is deterministic (fixed spawn, only target varies),
  # so per-room outcome has zero within-run variance -> 15 carries the same info as 30.
