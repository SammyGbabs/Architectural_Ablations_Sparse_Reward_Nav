# =============================================================================
# configs/dqn_exp4.yaml
# Phase 1 — DQN Exp 4 (largest net [1024,512], low lr 1e-4, high gamma 0.997,
# largest buffer 200k, small batch 128). Table 3 reports unstable updates and
# 30% SR — kept for faithful replication.
#
# Source: paper Table 1 ONLY (not in code). Shared rig from legacy
# dqn_training.py. activation_fn unset -> SB3 default (ReLU). Do NOT tune.
# NOTE: buffer_size 200000 == env_steps 200000, so the replay buffer never
# cycles within a run — this is the original design, preserved deliberately.
# =============================================================================

config_id: dqn_exp4
algo: dqn
policy: MlpPolicy

net_arch: [1024, 512]

lr: 0.0001                 # 1e-4
gamma: 0.997
batch_size: 128

n_seeds: 10
env_steps: 200000

buffer_size: 200000
exploration_fraction: 0.25
exploration_initial_eps: 1.0
exploration_final_eps: 0.03

target_update_interval: 1000
train_freq: 4
gradient_steps: 1

eval_freq: 10000
