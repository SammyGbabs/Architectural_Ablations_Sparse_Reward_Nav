# =============================================================================
# configs/ppo_exp2.yaml
# Phase 1 — PPO Exp 2 (mild inverted-ish: pi=[256,256], vf=[512,256] — critic
# wider than actor, i.e. a CONVENTIONAL larger-critic ratio).
#
# Source: paper Table 2 ONLY. This configuration was NOT present in the original
# notebook or the Training/ scripts (the code contains only PPO Exp 1, 3, 4), so
# it cannot be cross-checked against code — values are transcribed from Table 2.
# Fields not in Table 2 (ortho_init) fall back to the SB3 default.
# =============================================================================

config_id: ppo_exp2
algo: ppo
policy: MlpPolicy

net_arch:
  pi: [256, 256]
  vf: [512, 256]
activation_fn: Tanh        # Table 2
ortho_init: true           # NOT in Table 2, no code -> SB3 default (assumed)

lr: 0.0001                 # 1e-4
gamma: 0.990
batch_size: 128

n_seeds: 10
env_steps: 200000

n_steps: 2048
n_epochs: 15
gae_lambda: 0.90
clip_range: 0.1
ent_coef: 0.005

eval_freq: 20000
eval_episodes: 15          # config-driven; 15 = 5/room. Eval is deterministic (fixed spawn, only target varies),
  # so per-room outcome has zero within-run variance -> 15 carries the same info as 30.
